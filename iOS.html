<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TWSCPS-2526線上影展 - Ipad版</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
  
  <style>
    :root { --primary-color: #0056b3; --bg-color: #1a1a1d; }
    body { 
      margin: 0; padding: 0; font-family: 'Noto Sans TC', sans-serif; 
      background-color: var(--bg-color); color: #fff; overflow-x: hidden; 
      padding-bottom: 40vh; 
    }

    /* === Banner === */
    .banner-container { width: 100%; height: 260px; background-color: #000; overflow: hidden; }
    .banner-container img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* === 月份導覽 === */
    .month-nav-container {
      display: flex; gap: 8px; overflow-x: auto; white-space: nowrap;
      justify-content: center; margin-bottom: 20px; padding: 15px;
    }
    .month-btn {
      background: #333; border: none; padding: 10px 20px; border-radius: 30px;
      font-size: 14px; font-weight: bold; color: #ccc; cursor: pointer;
    }
    .month-btn.active { background: var(--primary-color); color: white; }

    /* === Swiper 區域 === */
    .swiper-outer { position: relative; max-width: 1200px; margin: 0 auto; padding: 0 10px; }
    .swiper { width: 100%; height: 65vh; min-height: 450px; background: #000; border-radius: 12px; transition: height 0.3s; }
    
    /* 瀏覽器原生全螢幕樣式 */
    .swiper:fullscreen, .swiper:-webkit-full-screen { width: 100vw; height: 100vh; border-radius: 0; }
    
    /* 偽全螢幕備援 (針對不支援原生 API 的環境) */
    .pseudo-fs { position: fixed !important; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999; border-radius: 0; }

    .swiper-slide { display: flex; align-items: center; justify-content: center; }
    .swiper-slide img { max-width: 100%; max-height: 100%; object-fit: contain; }
    
    /* 資料夾名稱標籤 */
    .folder-badge {
      position: absolute; top: 30px; left: 30px; 
      background: rgba(0, 0, 0, 0.65); color: white;
      padding: 12px 24px; border-radius: 30px; 
      font-weight: bold; font-size: 26px; z-index: 10; 
      border-left: 6px solid var(--primary-color);
    }

    /* 全螢幕切換按鈕 */
    .fs-toggle-btn {
      position: absolute; bottom: 25px; right: 25px; z-index: 10001;
      background: rgba(0, 0, 0, 0.5); color: white; border: 1px solid rgba(255,255,255,0.8);
      padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 15px;
      backdrop-filter: blur(5px); transition: background 0.3s;
    }
    .fs-toggle-btn:hover { background: rgba(0, 0, 0, 0.8); }

    /* 序號 */
    .custom-pagination { text-align: center; color: #fff; font-weight: bold; font-size: 22px; margin-top: 20px; }
    
    .swiper-button-next, .swiper-button-prev { color: white; scale: 1.3; }

    /* 音樂按鈕 */
    .music-control {
      position: fixed; bottom: 30px; left: 30px; z-index: 1000;
      background: rgba(0, 86, 179, 0.8); color: white;
      width: 55px; height: 55px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 26px; border: 2px solid #fff;
    }
    .music-control.playing { animation: rotate 4s linear infinite; }
    @keyframes rotate { from {transform: rotate(0deg);} to {transform: rotate(360deg);} }

    @media (max-width: 820px) {
        .banner-container { height: 180px; }
        .folder-badge { font-size: 20px; top: 20px; left: 20px; }
        .swiper { height: 55vh; }
    }
  </style>
</head>
<body>

  <audio id="bg-music" loop autoplay preload="auto"></audio>
  <div class="music-control" id="music-btn" onclick="toggleMusic()">🎵</div>

  <div class="banner-container">
    <img src="" id="banner-img">
  </div>

  <div class="main-content">
    <div class="month-nav-container" id="month-nav"></div>
    
    <div class="swiper-outer">
        <div class="swiper mySwiper" id="swiper-area">
          <div class="swiper-wrapper"></div>
          <div class="swiper-button-next"></div>
          <div class="swiper-button-prev"></div>
          
          <button id="fs-btn" class="fs-toggle-btn" onclick="toggleFullscreen()">⛶ 進入全螢幕模式</button>
        </div>
        <div class="custom-pagination" id="custom-pagination"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
  <script src="./data.js"></script> 
  
  <script>
    var mySwiper = null;
    var audio = document.getElementById('bg-music');
    var musicBtn = document.getElementById('music-btn');
    var fsBtn = document.getElementById('fs-btn');
    var isFullscreen = false;

    // 1. 初始化 Banner
    if(typeof eventConfig !== 'undefined') {
        document.getElementById('banner-img').src = eventConfig.bannerUrl;
        document.title = eventConfig.activityName;
    }

    // 2. 音樂播放邏輯
    document.addEventListener('click', function() {
        if (audio.paused && audio.src) {
            audio.play();
            musicBtn.classList.add('playing');
            musicBtn.innerText = '📻';
        }
    }, { once: true });

    document.addEventListener("DOMContentLoaded", function() {
      if(typeof localPlaylist !== 'undefined' && localPlaylist.length > 0) {
          audio.src = localPlaylist[0].src;
      }
      if(typeof localImages !== 'undefined') {
          initGallery(localImages);
      }
    });

    function toggleMusic() {
      if (audio.paused) {
        audio.play();
        musicBtn.classList.add('playing');
        musicBtn.innerText = '📻';
      } else {
        audio.pause();
        musicBtn.classList.remove('playing');
        musicBtn.innerText = '🎵';
      }
    }

    // 3. 全螢幕切換邏輯 (含文字變更)
    function toggleFullscreen() {
      var elem = document.getElementById('swiper-area');

      if (!isFullscreen) {
        // 進入全螢幕
        if (elem.requestFullscreen) {
          elem.requestFullscreen();
        } else if (elem.webkitRequestFullscreen) {
          elem.webkitRequestFullscreen();
        }
        elem.classList.add('pseudo-fs');
        fsBtn.innerHTML = '✕ 退出全螢幕模式'; // 變更文字
        isFullscreen = true;
      } else {
        // 退出全螢幕
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        }
        elem.classList.remove('pseudo-fs');
        fsBtn.innerHTML = '⛶ 進入全螢幕模式'; // 恢復文字
        isFullscreen = false;
      }
      setTimeout(function() { if(mySwiper) mySwiper.update(); }, 300);
    }

    // 監聽原生退出事件 (例如使用者按 ESC)
    function handleFsChange() {
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
            document.getElementById('swiper-area').classList.remove('pseudo-fs');
            fsBtn.innerHTML = '⛶ 進入全螢幕模式';
            isFullscreen = false;
        }
    }
    document.addEventListener('fullscreenchange', handleFsChange);
    document.addEventListener('webkitfullscreenchange', handleFsChange);

    function initGallery(data) {
      if (!data || data.length === 0) return;
      
      var navContainer = document.getElementById('month-nav');
      var currentMonth = null;
      var monthStartIndex = {};

      for (var i = 0; i < data.length; i++) {
        var imgData = data[i];
        if (imgData.monthLabel !== currentMonth) {
          if (!(imgData.monthLabel in monthStartIndex)) {
            monthStartIndex[imgData.monthLabel] = i;
            var btn = document.createElement('button');
            btn.className = 'month-btn';
            btn.innerText = imgData.monthLabel;
            btn.id = 'btn-month-' + imgData.monthLabel;
            (function(idx) {
              btn.onclick = function() { mySwiper.slideTo(idx, 400); };
            })(i);
            navContainer.appendChild(btn);
          }
          currentMonth = imgData.monthLabel;
        }
      }

      // 4. Swiper 自動切換 (2秒)
      mySwiper = new Swiper(".mySwiper", {
        slidesPerView: 1, 
        spaceBetween: 10,
        loop: true,
        navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" },
        pagination: { el: "#custom-pagination", type: "fraction" },
        autoplay: { 
            delay: 2000, 
            disableOnInteraction: false 
        },
        virtual: {
          slides: data,
          renderSlide: function (slideData) {
            var imgUrl = (window.location.protocol === 'file:') ? slideData.highUrl : slideData.thumbUrl;
            return '<div class="swiper-slide">' +
                     '<div class="folder-badge">' + slideData.folderName + '</div>' +
                     '<img src="' + imgUrl + '">' +
                   '</div>';
          }
        },
        on: { slideChange: function() { updateActiveMonthBtn(data); } }
      });
    } 

    function updateActiveMonthBtn(data) {
      if (!mySwiper) return;
      var currentIndex = mySwiper.realIndex;
      var currentLabel = data[currentIndex].monthLabel;
      var btns = document.querySelectorAll('.month-btn');
      btns.forEach(function(b) { b.classList.remove('active'); });
      var activeBtn = document.getElementById('btn-month-' + currentLabel);
      if (activeBtn) {
        activeBtn.classList.add('active');
        activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }
    }
  </script>
</body>
</html>
