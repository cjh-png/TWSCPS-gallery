<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>線上影展 - 終極修復版</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
  
  <style>
    :root { --primary-color: #0056b3; --bg-color: #1a1a1d; }
    body { 
      margin: 0; padding: 0; font-family: 'Noto Sans TC', sans-serif; 
      background-color: var(--bg-color); color: #fff; overflow-x: hidden; 
      padding-bottom: 40vh; /* 增加底部空間，讓照片能滑到中間 */
    }

    /* === Banner === */
    .banner-container { width: 100%; height: 260px; background-color: #000; }
    .banner-container img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* === 月份導覽 === */
    .month-nav-container {
      display: flex; gap: 8px; overflow-x: auto; white-space: nowrap;
      justify-content: center; margin-bottom: 20px; padding: 15px;
    }
    .month-btn {
      background: #333; border: none; padding: 10px 20px; border-radius: 30px;
      font-size: 14px; font-weight: bold; color: #ccc; cursor: pointer;
    }
    .month-btn.active { background: var(--primary-color); color: white; }

    /* === Swiper 核心容器 === */
    .swiper-outer { position: relative; max-width: 1200px; margin: 0 auto; padding: 0 10px; }
    .swiper { 
      width: 100%; height: 60vh; min-height: 400px; background: #000; border-radius: 12px;
      transition: all 0.3s ease;
    }
    
    /* iPad 全螢幕模式 (關鍵修復) */
    .swiper.pseudo-fullscreen {
      position: fixed !important; top: 0 !important; left: 0 !important; 
      width: 100vw !important; height: 100vh !important;
      z-index: 10000; margin: 0; border-radius: 0;
    }

    .swiper-slide { display: flex; align-items: center; justify-content: center; position: relative; }
    .swiper-slide img { max-width: 100%; max-height: 100%; object-fit: contain; }
    
    /* 資料夾名稱 (加大字體) */
    .folder-badge {
      position: absolute; top: 25px; left: 25px; 
      background: rgba(0, 0, 0, 0.75); color: white;
      padding: 12px 28px; border-radius: 35px; 
      font-weight: bold; font-size: 26px; z-index: 10; 
      border-left: 6px solid var(--primary-color);
      box-shadow: 0 4px 15px rgba(0,0,0,0.6);
    }

    /* 退出全螢幕按鈕 - 確保 iPad 頂層可見 */
    .exit-fs-btn {
      display: none; position: fixed; top: 20px; right: 20px; z-index: 10001;
      background: rgba(255, 0, 0, 0.8); color: white; border: none;
      padding: 12px 24px; border-radius: 8px; font-weight: bold; font-size: 18px;
    }

    /* 全螢幕進入按鈕 */
    .fs-trigger-btn {
      position: absolute; bottom: 20px; right: 20px; z-index: 50;
      background: rgba(0, 0, 0, 0.6); color: white; border: 1px solid #fff;
      padding: 10px 18px; border-radius: 8px; cursor: pointer;
    }

    /* 序號顯示 (置於圖片下方) */
    .custom-pagination { 
      text-align: center; color: #fff; font-weight: bold; font-size: 22px; 
      margin-top: 25px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px;
    }
    
    .swiper-button-next, .swiper-button-prev { color: white; transform: scale(1.2); }

    /* 音樂控制 */
    .music-control {
      position: fixed; bottom: 30px; left: 30px; z-index: 999;
      background: rgba(0, 86, 179, 0.9); color: white;
      width: 60px; height: 60px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 28px; border: 2px solid #fff;
    }
    .music-control.playing { animation: rotate 4s linear infinite; }
    @keyframes rotate { from {transform: rotate(0deg);} to {transform: rotate(360deg);} }

    @media (max-width: 820px) {
        .banner-container { height: 180px; }
        .folder-badge { font-size: 20px; top: 15px; left: 15px; }
        .swiper { height: 55vh; }
    }
  </style>
</head>
<body>

  <audio id="bg-music" loop preload="auto"></audio>
  
  <div class="music-control" id="music-btn" onclick="toggleMusic()">🎵</div>

  <button class="exit-fs-btn" id="exit-btn" onclick="toggleFullscreen()">✖ 退出全螢幕</button>

  <div class="banner-container">
    <img src="" id="banner-img" onerror="this.style.display='none'">
  </div>

  <div class="main-content">
    <div class="month-nav-container" id="month-nav" style="display: none;"></div>
    
    <div class="swiper-outer">
        <div class="swiper mySwiper" style="display: none;" id="swiper-area">
          <div class="swiper-wrapper"></div>
          <div class="swiper-button-next"></div>
          <div class="swiper-button-prev"></div>
          <button id="fs-btn" class="fs-trigger-btn" onclick="toggleFullscreen()">⛶ 全螢幕模式</button>
        </div>
        <div class="custom-pagination" id="custom-pagination" style="display: none;"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
  <script src="./data.js"></script> 
  
  <script>
    var mySwiper = null;
    var audio = document.getElementById('bg-music');
    var musicBtn = document.getElementById('music-btn');
    var isFullscreen = false;

    document.addEventListener("DOMContentLoaded", function() {
      // 1. 自動從 data.js 讀取 banner 資訊
      if(typeof eventConfig !== 'undefined') {
          document.title = eventConfig.activityName;
          document.getElementById('banner-img').src = eventConfig.bannerUrl;
      }

      // 2. 自動從 localPlaylist 抓取第一首歌
      if(typeof localPlaylist !== 'undefined' && localPlaylist.length > 0) {
          // 清除可能存在的 Unicode 隱形亂碼
          var cleanSrc = localPlaylist[0].src.replace(/[^\x20-\x7E]/g, ''); 
          audio.src = cleanSrc;
      }
      
      if(typeof localImages !== 'undefined') {
          initGallery(localImages);
      }
    });

    function toggleMusic() {
      if (!audio.src) return alert("找不到音樂檔案");
      if (audio.paused) {
        audio.play().catch(function(e) { console.log("播放被阻擋:", e); });
        musicBtn.classList.add('playing');
        musicBtn.innerText = '📻';
      } else {
        audio.pause();
        musicBtn.classList.remove('playing');
        musicBtn.innerText = '🎵';
      }
    }

    function toggleFullscreen() {
      var swiperArea = document.getElementById('swiper-area');
      var exitBtn = document.getElementById('exit-btn');
      var entryBtn = document.getElementById('fs-btn');

      if (!isFullscreen) {
        swiperArea.classList.add('pseudo-fullscreen');
        exitBtn.style.display = 'block'; // 顯示紅色退出鈕
        entryBtn.style.display = 'none';
        isFullscreen = true;
      } else {
        swiperArea.classList.remove('pseudo-fullscreen');
        exitBtn.style.display = 'none';
        entryBtn.style.display = 'block';
        isFullscreen = false;
      }
      if(mySwiper) { setTimeout(function() { mySwiper.update(); }, 300); }
    }

    function initGallery(data) {
      if (!data || data.length === 0) return;
      document.getElementById('swiper-area').style.display = 'block';
      document.getElementById('custom-pagination').style.display = 'block';
      document.getElementById('month-nav').style.display = 'flex';
      
      var navContainer = document.getElementById('month-nav');
      var currentMonth = null;
      var monthStartIndex = {};

      for (var i = 0; i < data.length; i++) {
        var imgData = data[i];
        if (imgData.monthLabel !== currentMonth) {
          if (!(imgData.monthLabel in monthStartIndex)) {
            monthStartIndex[imgData.monthLabel] = i;
            var btn = document.createElement('button');
            btn.className = 'month-btn';
            btn.innerText = imgData.monthLabel;
            btn.id = 'btn-month-' + imgData.monthLabel;
            (function(idx) {
              btn.onclick = function() { mySwiper.slideTo(idx, 0); };
            })(i);
            navContainer.appendChild(btn);
          }
          currentMonth = imgData.monthLabel;
        }
      }

      mySwiper = new Swiper(".mySwiper", {
        slidesPerView: 1, 
        spaceBetween: 20, 
        navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" },
        pagination: { el: "#custom-pagination", type: "fraction" },
        autoplay: { delay: 3000, disableOnInteraction: false },
        virtual: {
          slides: data,
          renderSlide: function (slideData) {
            var isLocal = window.location.protocol === 'file:';
            var imgUrl = isLocal ? slideData.highUrl : slideData.thumbUrl;
            var safeFolderName = slideData.folderName.replace(/"/g, '&quot;');
            return '<div class="swiper-slide">' +
                     '<div class="folder-badge">' + safeFolderName + '</div>' +
                     '<img src="' + imgUrl + '">' +
                   '</div>';
          }
        },
        on: { slideChange: function() { updateActiveMonthBtn(data); } }
      });
    } 

    function updateActiveMonthBtn(data) {
      if (!mySwiper) return;
      var currentIndex = mySwiper.activeIndex;
      var currentLabel = data[currentIndex].monthLabel;
      var btns = document.querySelectorAll('.month-btn');
      btns.forEach(function(b) { b.classList.remove('active'); });
      var activeBtn = document.getElementById('btn-month-' + currentLabel);
      if (activeBtn) {
        activeBtn.classList.add('active');
        activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }
    }
  </script>
</body>
</html>
