<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>專業修復版 - 3D 影展</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
  <style>
    :root { --primary: #007AFF; --bg: #000; }
    body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; overflow-x: hidden; }

    /* 3D Banner 效果 */
    .banner-container { width: 100%; height: 220px; overflow: hidden; position: relative; }
    .banner-img { width: 100%; height: 110%; object-fit: cover; filter: brightness(0.6); position: absolute; top: -5%; }
    .banner-title { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 1.8rem; font-weight: bold; text-shadow: 0 4px 10px rgba(0,0,0,0.5); width: 90%; text-align: center; }

    /* 月份導覽 */
    .month-nav { display: flex; gap: 10px; overflow-x: auto; padding: 15px; position: sticky; top: 0; z-index: 100; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
    .month-nav::-webkit-scrollbar { display: none; }
    .month-btn { padding: 8px 18px; border-radius: 20px; border: 1px solid #444; background: #222; color: #ccc; white-space: nowrap; font-size: 14px; cursor: pointer; }
    .month-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* Swiper 3D 容器 */
    .swiper { width: 100%; padding-top: 20px; padding-bottom: 50px; }
    .swiper-slide { 
      width: 80% !important; /* 手機端自動等比例 */
      max-width: 600px;
      height: 60vh;
      display: flex; align-items: center; justify-content: center;
      background: #111; border-radius: 15px; overflow: hidden;
    }
    .swiper-slide img { width: 100%; height: 100%; object-fit: contain; }

    /* 響應式文字 (Folder Badge) */
    .folder-badge {
      position: absolute; top: 10px; left: 10px;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
      padding: 4px 10px; border-radius: 5px;
      /* 重要：使用 clamp 確保字體在手機上變小，在 iPad 上適中 */
      font-size: clamp(10px, 3vw, 14px); 
      border-left: 3px solid var(--primary);
      max-width: 90%;
    }

    @media (max-width: 600px) {
      .banner-container { height: 160px; }
      .swiper-slide { height: 50vh; }
    }
  </style>
</head>
<body>

  <div class="banner-container">
    <img id="banner-img" class="banner-img" src="">
    <div id="activity-name" class="banner-title">載入中...</div>
  </div>

  <div id="nav" class="month-nav"></div>

  <div class="swiper mySwiper">
    <div class="swiper-wrapper"></div>
    <div class="swiper-pagination"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
  <script src="./data.js"></script>

  <script>
    var mySwiper;

    document.addEventListener('DOMContentLoaded', function() {
      // 1. 初始化基礎資訊
      document.getElementById('activity-name').innerText = eventConfig.activityName;
      document.getElementById('banner-img').src = eventConfig.bannerUrl;

      // 2. 生成月份導覽
      var nav = document.getElementById('nav');
      var months = [];
      localImages.forEach(function(img) {
        if (months.indexOf(img.monthLabel) === -1) months.push(img.monthLabel);
      });

      months.forEach(function(m) {
        var btn = document.createElement('button');
        btn.className = 'month-btn';
        btn.id = 'btn-month-' + m;
        btn.innerText = m;
        btn.onclick = function() {
          var targetIndex = localImages.findIndex(img => img.monthLabel === m);
          mySwiper.slideTo(targetIndex);
        };
        nav.appendChild(btn);
      });

      // 3. 初始化 Swiper (回退到更穩定的渲染邏輯)
      mySwiper = new Swiper(".mySwiper", {
        effect: "coverflow", // 🟢 3D 效果
        grabCursor: true,
        centeredSlides: true,
        slidesPerView: "auto",
        coverflowEffect: {
          rotate: 15,
          stretch: 0,
          depth: 100,
          modifier: 2,
          slideShadows: true,
        },
        virtual: {
          slides: localImages,
          renderSlide: function (slide, index) {
            // 🟢 使用 iOS.html 成功的路徑判斷邏輯，不加額外的 safeUrl
            var imgUrl = (window.location.protocol === 'file:') ? slide.highUrl : slide.thumbUrl;
            return '<div class="swiper-slide">' +
                     '<div class="folder-badge">' + slide.folderName + '</div>' +
                     '<img src="' + imgUrl + '">' +
                   '</div>';
          }
        },
        pagination: { el: ".swiper-pagination", type: "fraction" },
        on: {
          slideChange: function() {
            updateMonthNav(this.realIndex);
          }
        }
      });
    });

    function updateMonthNav(index) {
      var currentMonth = localImages[index].monthLabel;
      document.querySelectorAll('.month-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.innerText === currentMonth);
        if (btn.innerText === currentMonth) {
          btn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }
      });
    }
  </script>
</body>
</html>
