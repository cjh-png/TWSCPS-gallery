<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>線上影展 - 極簡測試版</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
  
  <style>
    :root {
      --primary-color: #0056b3; 
      --bg-color: #1a1a1d; 
    }
    
    body { 
      margin: 0; padding: 0; 
      font-family: 'Noto Sans TC', sans-serif; 
      background-color: var(--bg-color); 
      color: #fff; 
      overflow-x: hidden; 
    }

    /* === 1. Banner === */
    .banner-container { 
      width: 100%; height: 260px; background-color: #000; 
    }
    .banner-container img { 
      width: 100%; height: 100%; object-fit: cover; display: block;
    }

    /* === 2. 內容主體 === */
    .main-content { 
      max-width: 1200px; margin: 20px auto; padding: 10px; 
    }

    /* === 3. 月份按鈕 === */
    .month-nav-container {
      display: flex; gap: 8px; overflow-x: auto; white-space: nowrap;
      justify-content: center; margin-bottom: 20px; padding: 10px;
    }
    .month-btn {
      background: #333; border: none; padding: 8px 18px; border-radius: 30px;
      font-size: 14px; font-weight: bold; color: #ccc; cursor: pointer;
    }
    .month-btn.active { 
      background: var(--primary-color); color: white; 
    }

    /* === 4. 最基礎的圖片輪播 === */
    .swiper { 
      width: 100%; height: 60vh; min-height: 300px; background: #000; border-radius: 10px;
    }
    .swiper-slide { 
      display: flex; align-items: center; justify-content: center;
    }
    .swiper-slide img { 
      max-width: 100%; max-height: 100%; object-fit: contain; 
    }
    
    .swiper-pagination-fraction { color: #fff; font-weight: bold; }
    .swiper-button-next, .swiper-button-prev { color: white; }

    /* 📱 手機與平板適應 */
    @media (max-width: 820px) {
        .banner-container { height: 180px; }
        .month-nav-container { justify-content: flex-start; }
    }
  </style>
</head>
<body>

  <div class="banner-container">
    <img src="" id="banner-img" onerror="this.style.display='none'">
  </div>

  <div class="main-content">
    <h2 id="activity-title" style="text-align:center;"></h2>
    
    <div class="month-nav-container" id="month-nav" style="display: none;"></div>
    
    <div class="swiper mySwiper" style="display: none;" id="swiper-area">
      <div class="swiper-wrapper" id="swiper-wrapper"></div>
      <div class="swiper-pagination"></div>
      <div class="swiper-button-next"></div>
      <div class="swiper-button-prev"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
  <script src="./data.js"></script> 
  
  <script>
    var mySwiper = null;
    var monthStartIndex = {}; 
    
    // 判斷是否為本地開啟，決定載入高畫質或縮圖
    var isLocal = window.location.protocol === 'file:' || 
                  window.location.hostname === 'localhost' || 
                  window.location.hostname === '127.0.0.1';

    // 網頁載入後立即執行
    document.addEventListener("DOMContentLoaded", function() {
      // 讀取標題與 Banner
      if(typeof eventConfig !== 'undefined') {
          document.title = eventConfig.activityName;
          document.getElementById('activity-title').innerText = eventConfig.activityName;
          document.getElementById('banner-img').src = eventConfig.bannerUrl;
      }
      
      // 讀取相片
      if(typeof localImages !== 'undefined') {
          initGallery(localImages);
      }
    });

    // 建立相簿功能
    function initGallery(data) {
      if (!data || data.length === 0) return;

      document.getElementById('swiper-area').style.display = 'block';
      document.getElementById('month-nav').style.display = 'flex';
      
      var wrapper = document.getElementById('swiper-wrapper');
      var navContainer = document.getElementById('month-nav');
      var currentMonth = null;

      // 迴圈生成圖片與按鈕
      data.forEach(function(img, index) {
        // 生成月份按鈕
        if (img.monthLabel !== currentMonth) {
          if (!(img.monthLabel in monthStartIndex)) {
            monthStartIndex[img.monthLabel] = index;
            var btn = document.createElement('button');
            btn.className = 'month-btn';
            btn.innerText = img.monthLabel;
            btn.id = 'btn-month-' + img.monthLabel;
            btn.onclick = function() { 
                if(mySwiper) mySwiper.slideTo(index); 
            };
            navContainer.appendChild(btn);
          }
          currentMonth = img.monthLabel;
        }

        // 生成圖片 Slide (拔除所有特效，單純放入圖片)
        var imgUrl = isLocal ? img.highUrl : img.thumbUrl;
        var slide = document.createElement('div');
        slide.className = 'swiper-slide';
        slide.innerHTML = '<img src="' + imgUrl + '" alt="' + img.folderName + '">';
        wrapper.appendChild(slide);
      });

      // 初始化 Swiper (最簡化的 2D 滑動設定)
      mySwiper = new Swiper(".mySwiper", {
        slidesPerView: 1, 
        spaceBetween: 20, 
        navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" },
        pagination: { el: ".swiper-pagination", type: "fraction" },
        on: { 
          slideChange: function () { 
            updateActiveMonthBtn(); 
          }
        }
      });
      
      updateActiveMonthBtn(); 
    } 

    // 更新目前亮起的月份按鈕
    function updateActiveMonthBtn() {
      if (!mySwiper || typeof localImages === 'undefined' || localImages.length === 0) return;
      var currentIndex = mySwiper.activeIndex;
      if (!localImages[currentIndex]) return;
      
      var currentLabel = localImages[currentIndex].monthLabel;
      var btns = document.querySelectorAll('.month-btn');
      btns.forEach(b => b.classList.remove('active'));
      
      var activeBtn = document.getElementById('btn-month-' + currentLabel);
      if (activeBtn) {
        activeBtn.classList.add('active');
        // 讓選中的按鈕自動滾動到畫面可見範圍
        activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }
    }
  </script>
</body>
</html>
