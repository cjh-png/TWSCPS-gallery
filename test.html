<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TWSCPS-2526 專業3D展廳</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
  
  <style>
    :root { --primary: #007AFF; --bg: #000; }
    body { 
      margin: 0; padding: 0; font-family: 'Noto Sans TC', sans-serif; 
      background-color: var(--bg); color: #fff; overflow-x: hidden; 
    }

    /* === 3D 專業 Banner (參考 index.html 樣式) === */
    .banner-wrapper { 
      position: relative; width: 100%; height: 260px; 
      background-color: #000; overflow: hidden;
    }
    .banner-blur { 
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background-size: cover; background-position: center;
      filter: blur(15px) brightness(0.5); transform: scale(1.2);
    }
    .banner-img { 
      position: relative; width: 100%; height: 100%; 
      object-fit: contain; z-index: 2; 
    }

    /* === 月份導覽 (吸頂效果) === */
    #month-nav { 
      display: flex; gap: 10px; overflow-x: auto; padding: 15px; 
      background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
      position: sticky; top: 0; z-index: 100;
    }
    #month-nav::-webkit-scrollbar { display: none; }
    .month-btn { 
      padding: 8px 18px; border-radius: 20px; border: 1px solid #444;
      background: #222; color: #ccc; white-space: nowrap; font-size: 14px;
    }
    .month-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* === Swiper 3D 核心配置 === */
    .swiper { width: 100%; padding-top: 30px; padding-bottom: 80px; }
    .swiper-slide { 
      /* 🟢 修正：手機與 iPad 的等比例寬度 */
      width: 85% !important; 
      max-width: 650px;
      height: 60vh; 
      background: #111; border-radius: 15px; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 15px 35px rgba(0,0,0,0.5);
    }
    .swiper-slide img { width: 100%; height: 100%; object-fit: contain; }

    /* 🟢 修正：文件夾標籤等比例縮放 (不再遮擋) */
    .folder-badge {
      position: absolute; top: 12px; left: 12px; z-index: 10;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
      padding: 5px 12px; border-radius: 6px;
      border-left: 4px solid var(--primary);
      /* 使用 clamp：最小 10px，隨螢幕寬度變動，最大 15px */
      font-size: clamp(10px, 2.5vw, 15px);
      max-width: 85%;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    #custom-pagination { text-align: center; margin-top: -40px; font-weight: bold; color: #888; }
  </style>
</head>
<body>

  <div class="banner-wrapper">
    <div id="banner-blur" class="banner-blur"></div>
    <img id="banner-img" class="banner-img" src="">
  </div>

  <div id="month-nav"></div>

  <div class="swiper mySwiper">
    <div class="swiper-wrapper"></div>
    <div id="custom-pagination"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
  <script src="./data.js"></script>

  <script>
    var mySwiper;

    document.addEventListener('DOMContentLoaded', function() {
      if (typeof eventConfig !== 'undefined') {
        document.getElementById('banner-img').src = eventConfig.bannerUrl;
        document.getElementById('banner-blur').style.backgroundImage = "url('" + eventConfig.bannerUrl + "')";
      }
      if (typeof localImages !== 'undefined' && localImages.length > 0) {
        initGallery(localImages);
      }
    });

    function initGallery(data) {
      // 1. 月份導覽按鈕
      var nav = document.getElementById('month-nav');
      var months = [];
      data.forEach(function(img) {
        if (months.indexOf(img.monthLabel) === -1) months.push(img.monthLabel);
      });

      months.forEach(function(m) {
        var btn = document.createElement('button');
        btn.className = 'month-btn';
        btn.id = 'btn-month-' + m;
        btn.innerText = m;
        btn.onclick = function() {
          var targetIndex = data.findIndex(function(img) { return img.monthLabel === m; });
          mySwiper.slideTo(targetIndex);
        };
        nav.appendChild(btn);
      });

      // 2. 初始化 Swiper (注入 3D 效果)
      mySwiper = new Swiper(".mySwiper", {
        effect: "coverflow", // 🟢 開啟 3D
        centeredSlides: true,
        slidesPerView: "auto",
        coverflowEffect: {
          rotate: 20,    // 旋轉角度
          stretch: 0,
          depth: 150,    // 深度感
          modifier: 1,
          slideShadows: true,
        },
        // 🔴 修正：Virtual 模式下，loop: true 有時會導致圖片渲染失敗，建議改為 false 測試
        loop: false, 
        pagination: { el: "#custom-pagination", type: "fraction" },
        virtual: {
          slides: data,
          renderSlide: function (slideData) {
            // 🟢 完全保留 iOS.html 成功的路徑邏輯，不使用 encodeURI
            var imgUrl = (window.location.protocol === 'file:') ? slideData.highUrl : slideData.thumbUrl;
            return '<div class="swiper-slide">' +
                     '<div class="folder-badge">' + slideData.folderName + '</div>' +
                     '<img src="' + imgUrl + '" loading="lazy">' +
                   '</div>';
          }
        },
        on: {
          slideChange: function() {
            updateActiveMonthBtn(data);
          }
        }
      });
    }

    function updateActiveMonthBtn(data) {
      if (!mySwiper) return;
      var currentIndex = mySwiper.activeIndex; // 虛擬模式建議用 activeIndex
      var currentLabel = data[currentIndex].monthLabel;
      document.querySelectorAll('.month-btn').forEach(function(b) { b.classList.remove('active'); });
      var activeBtn = document.getElementById('btn-month-' + currentLabel);
      if (activeBtn) {
        activeBtn.classList.add('active');
        activeBtn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
      }
    }
  </script>
</body>
</html>
