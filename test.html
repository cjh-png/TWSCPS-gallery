<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>線上影展 - 虛擬列表 (全螢幕+序號修復)</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
  
  <style>
    :root {
      --primary-color: #0056b3; 
      --bg-color: #1a1a1d; 
    }
    
    body { 
      margin: 0; padding: 0; 
      font-family: 'Noto Sans TC', sans-serif; 
      background-color: var(--bg-color); 
      color: #fff; 
      overflow-x: hidden; 
      /* 👇 增加網頁底部的空白空間，讓圖片可以被滑到螢幕正中間 */
      padding-bottom: 30vh; 
    }

    /* === 1. Banner === */
    .banner-container { 
      width: 100%; height: 260px; background-color: #000; 
    }
    .banner-container img { 
      width: 100%; height: 100%; object-fit: cover; display: block;
    }

    /* === 2. 內容主體 === */
    .main-content { 
      max-width: 1200px; margin: 20px auto; padding: 10px; 
    }

    /* === 3. 月份按鈕 === */
    .month-nav-container {
      display: flex; gap: 8px; overflow-x: auto; white-space: nowrap;
      justify-content: center; margin-bottom: 20px; padding: 10px;
    }
    .month-btn {
      background: #333; border: none; padding: 8px 18px; border-radius: 30px;
      font-size: 14px; font-weight: bold; color: #ccc; cursor: pointer;
    }
    .month-btn.active { 
      background: var(--primary-color); color: white; 
    }

    /* === 4. Swiper 容器 === */
    .swiper-outer { position: relative; }

    .swiper { 
      width: 100%; height: 60vh; min-height: 300px; background: #000; border-radius: 10px;
      transition: all 0.3s ease; /* 讓全螢幕切換有動畫 */
    }
    
    /* 👇 專門給 iPad 用的「完美全螢幕」樣式 */
    .swiper.pseudo-fullscreen {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: 9999; margin: 0; border-radius: 0;
    }

    .swiper-slide { 
      display: flex; align-items: center; justify-content: center;
      position: relative; 
    }
    
    /* === 5. 左上角資料夾標籤 === */
    .folder-badge {
      position: absolute; top: 20px; left: 20px; 
      background: rgba(0, 0, 0, 0.7); color: white;
      padding: 8px 20px; border-radius: 25px; 
      font-weight: bold; font-size: 20px; z-index: 10; 
      border-left: 5px solid var(--primary-color);
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    
    .swiper-slide img { 
      max-width: 100%; max-height: 100%; object-fit: contain; 
    }

    /* === 6. 全螢幕按鈕 === */
    .fullscreen-btn {
      position: absolute; bottom: 20px; right: 20px; z-index: 50;
      background: rgba(0, 0, 0, 0.6); color: white; border: 1px solid #888;
      padding: 8px 15px; border-radius: 8px; cursor: pointer;
      font-size: 16px; font-weight: bold; display: flex; align-items: center; gap: 5px;
    }
    .fullscreen-btn:hover { background: rgba(0, 0, 0, 0.9); }

    /* === 7. 序號與總數文字 (移到圖片外部) === */
    .custom-pagination { 
      text-align: center; color: #ccc; font-weight: bold; font-size: 18px; 
      margin-top: 15px; /* 與圖片保持距離 */
    }
    
    .swiper-button-next, .swiper-button-prev { color: white; }

    /* === 8. 背景音樂按鈕 === */
    .music-control {
      position: fixed; bottom: 20px; right: 20px; z-index: 100;
      background: rgba(0, 86, 179, 0.8); color: white;
      width: 50px; height: 50px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 20px; border: 2px solid #fff;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }
    .music-control.playing { animation: rotate 3s linear infinite; }
    @keyframes rotate { from {transform: rotate(0deg);} to {transform: rotate(360deg);} }

    @media (max-width: 820px) {
        .banner-container { height: 180px; }
        .month-nav-container { justify-content: flex-start; }
        .folder-badge { font-size: 16px; top: 15px; left: 15px; }
    }
  </style>
</head>
<body>

  <audio id="bg-music" loop preload="auto">
    <source src="./music.mp3" type="audio/mpeg">
  </audio>
  
  <div class="music-control" id="music-btn" onclick="toggleMusic()">🎵</div>

  <div class="banner-container">
    <img src="" id="banner-img" onerror="this.style.display='none'">
  </div>

  <div class="main-content">
    <div class="month-nav-container" id="month-nav" style="display: none;"></div>
    
    <div class="swiper-outer">
        <div class="swiper mySwiper" style="display: none;" id="swiper-area">
          <div class="swiper-wrapper"></div>
          
          <div class="swiper-button-next"></div>
          <div class="swiper-button-prev"></div>
          
          <button id="fs-btn" class="fullscreen-btn" onclick="toggleFullscreen()">⛶ 全螢幕</button>
        </div>
        
        <div class="custom-pagination" id="custom-pagination" style="display: none;"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
  <script src="./data.js"></script> 
  
  <script>
    var mySwiper = null;
    var monthStartIndex = {}; 
    var audio = document.getElementById('bg-music');
    var musicBtn = document.getElementById('music-btn');
    var swiperArea = document.getElementById('swiper-area');
    var isFullscreen = false;
    
    var isLocal = window.location.protocol === 'file:' || 
                  window.location.hostname === 'localhost' || 
                  window.location.hostname === '127.0.0.1';

    document.addEventListener("DOMContentLoaded", function() {
      if(typeof eventConfig !== 'undefined') {
          document.title = eventConfig.activityName;
          document.getElementById('banner-img').src = eventConfig.bannerUrl;
      }
      
      if(typeof localImages !== 'undefined') {
          initGallery(localImages);
      }
    });

    // 音樂開關
    function toggleMusic() {
      if (audio.paused) {
        audio.play();
        musicBtn.classList.add('playing');
        musicBtn.innerText = '📻';
      } else {
        audio.pause();
        musicBtn.classList.remove('playing');
        musicBtn.innerText = '🎵';
      }
    }

    // 全螢幕開關 (CSS 覆蓋法，iPad 100% 支援)
    function toggleFullscreen() {
      var fsBtn = document.getElementById('fs-btn');
      if (!isFullscreen) {
        swiperArea.classList.add('pseudo-fullscreen');
        fsBtn.innerHTML = '✖ 退出全螢幕';
        isFullscreen = true;
      } else {
        swiperArea.classList.remove('pseudo-fullscreen');
        fsBtn.innerHTML = '⛶ 全螢幕';
        isFullscreen = false;
      }
      // 全螢幕切換後，告訴 Swiper 重新計算大小
      if(mySwiper) {
        setTimeout(function() { mySwiper.update(); }, 300);
      }
    }

    function initGallery(data) {
      if (!data || data.length === 0) return;

      document.getElementById('swiper-area').style.display = 'block';
      document.getElementById('custom-pagination').style.display = 'block';
      document.getElementById('month-nav').style.display = 'flex';
      
      var navContainer = document.getElementById('month-nav');
      var currentMonth = null;

      for (var i = 0; i < data.length; i++) {
        var imgData = data[i];
        if (imgData.monthLabel !== currentMonth) {
          if (!(imgData.monthLabel in monthStartIndex)) {
            monthStartIndex[imgData.monthLabel] = i;
            var btn = document.createElement('button');
            btn.className = 'month-btn';
            btn.innerText = imgData.monthLabel;
            btn.id = 'btn-month-' + imgData.monthLabel;
            
            (function(index) {
              btn.onclick = function() { 
                  if(mySwiper) {
                    mySwiper.slideTo(index, 0);
                    if(mySwiper.autoplay && mySwiper.autoplay.running) {
                        mySwiper.autoplay.start(); 
                    }
                  }
              };
            })(i);
            
            navContainer.appendChild(btn);
          }
          currentMonth = imgData.monthLabel;
        }
      }

      mySwiper = new Swiper(".mySwiper", {
        slidesPerView: 1, 
        spaceBetween: 20, 
        navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" },
        
        // 👇 將分頁器綁定到外部的 div
        pagination: { 
            el: "#custom-pagination", 
            type: "fraction" 
        },
        
        autoplay: { delay: 3000, disableOnInteraction: false },
        
        virtual: {
          slides: data,
          renderSlide: function (slideData, index) {
            var imgUrl = isLocal ? slideData.highUrl : slideData.thumbUrl;
            var safeFolderName = slideData.folderName ? slideData.folderName.replace(/"/g, '&quot;') : '';

            return '<div class="swiper-slide">' +
                     '<div class="folder-badge">' + safeFolderName + '</div>' +
                     '<img src="' + imgUrl + '" alt="' + safeFolderName + '">' +
                   '</div>';
          }
        },
        
        on: { 
          slideChange: function () { 
            updateActiveMonthBtn(); 
          }
        }
      });
      
      updateActiveMonthBtn(); 
    } 

    function updateActiveMonthBtn() {
      if (!mySwiper || typeof localImages === 'undefined' || localImages.length === 0) return;
      var currentIndex = mySwiper.activeIndex;
      if (!localImages[currentIndex]) return;
      
      var currentLabel = localImages[currentIndex].monthLabel;
      var btns = document.querySelectorAll('.month-btn');
      
      for (var i = 0; i < btns.length; i++) {
        btns[i].classList.remove('active');
      }
      
      var activeBtn = document.getElementById('btn-month-' + currentLabel);
      if (activeBtn) {
        activeBtn.classList.add('active');
        activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }
    }
  </script>
</body>
</html>
