<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>線上影展 - 3D 虛擬展廳</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
  
  <style>
    :root { --primary-color: #0056b3; --bg-color: #1a1a1d; }
    body { margin: 0; padding: 0; font-family: 'Noto Sans TC', sans-serif; background-color: var(--bg-color); color: #fff; overflow-x: hidden; -webkit-user-select: none; user-select: none; }

    /* === Banner === */
    .banner-container { position: relative; width: 100%; height: 260px; background-color: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
    .banner-bg-blur { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; filter: blur(25px) brightness(0.6); transform: scale(1.1); z-index: 1; }
    .banner-new-photo { display: block; max-width: 100%; height: 100%; object-fit: contain; position: relative; z-index: 2; }

    /* === Main Container === */
    .main-content { max-width: 1600px; margin: -20px auto 40px auto; padding: 10px; position: relative; z-index: 10; }

    /* === 月份導覽 === */
    .month-nav-container {
      background: rgba(40,40,45,0.8); padding: 10px 15px; border-radius: 50px;
      display: flex; gap: 8px; overflow-x: auto; white-space: nowrap; justify-content: center; backdrop-filter: blur(10px);
    }
    .month-nav-container::-webkit-scrollbar { display: none; }
    .month-btn { background: rgba(60,60,65,0.5); border: none; padding: 8px 18px; border-radius: 30px; font-size: 14px; font-weight: bold; color: #ccc; cursor: pointer; }
    .month-btn.active { background: var(--primary-color); color: white; }

    /* === 3D Swiper (與虛擬列表兼容) === */
    .swiper { width: 100%; padding-top: 20px; padding-bottom: 70px; }
    .swiper-slide { 
      width: 500px; height: 75vh; max-height: 800px; min-height: 400px; 
      background-color: #000; border-radius: 15px; overflow: hidden; position: relative; 
      display: flex; align-items: center; justify-content: center;
    }
    
    /* 虛擬列表載入中的佔位背景 */
    .slide-bg-blur { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; filter: blur(25px) brightness(0.6); transform: scale(1.1); z-index: 1; }
    .main-photo { display: block; max-width: 100%; height: 100%; object-fit: contain; position: relative; z-index: 2; cursor: pointer; }
    
    .folder-badge { position: absolute; top: 20px; left: 20px; background: rgba(0, 0, 0, 0.6); color: white; padding: 7px 18px; border-radius: 30px; font-weight: bold; font-size: 13px; z-index: 10; border-left: 3px solid var(--primary-color); }
    .photo-name { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); color: #fff; font-size: 12px; padding: 30px 15px 15px; text-align: center; z-index: 4; }

    /* 工具組件 */
    .music-player, .fullscreen-btn { position: fixed; bottom: 20px; z-index: 1000; background: rgba(30,30,35,0.8); backdrop-filter: blur(10px); border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); }
    .music-player { right: 20px; display: flex; align-items: center; padding: 8px 15px; gap: 10px; }
    .fullscreen-btn { left: 20px; width: 42px; height: 42px; color: white; cursor: pointer; display: flex; justify-content: center; align-items: center; }
    
    #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 10000; cursor: zoom-out; }
    #overlay img { max-width: 95%; max-height: 95%; object-fit: contain; }

    #welcome-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.6s; }
    #enter-btn { padding: 12px 35px; background: var(--primary-color); color: white; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,86,179,0.5); }

    @media (max-width: 600px) {
      .swiper-slide { width: 85%; height: 65vh; }
      .banner-container { height: 180px; }
    }
  </style>
</head>
<body>

  <div id="welcome-screen">
    <div class="welcome-title" id="welcome-title-text" style="font-size:24px; margin-bottom:20px;">載入中...</div>
    <button id="enter-btn">進入展廳</button>
  </div>

  <div class="banner-container">
    <div class="banner-bg-blur" id="banner-blur"></div>
    <img id="banner-img" class="banner-new-photo">
  </div>

  <div class="main-content">
    <div class="month-nav-container" id="month-nav"></div>
    <div class="swiper mySwiper" id="swiper-area">
      <div class="swiper-wrapper"></div>
      <div class="swiper-pagination"></div>
      <div class="swiper-button-next"></div>
      <div class="swiper-button-prev"></div>
    </div>
  </div>

  <button class="fullscreen-btn" onclick="toggleFullScreen()">📺</button>
  <div class="music-player" id="music-player-ui">
    <button class="play-btn" id="play-btn-icon" onclick="toggleMusic()" style="background:var(--primary-color); border:none; color:white; width:34px; height:34px; border-radius:50%; cursor:pointer;">▶️</button>
    <div class="track-info" id="track-name" style="font-size:12px;">音樂載入中...</div>
  </div>

  <div id="overlay" onclick="closeOverlay()">
    <img id="overlay-img" src="">
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
  <script src="./data.js"></script> 
  
  <script>
    var mySwiper = null;
    var myAudio = new Audio();
    var isLocal = window.location.protocol === 'file:';

    document.addEventListener("DOMContentLoaded", function() {
      if(typeof eventConfig !== 'undefined') {
        document.title = eventConfig.activityName;
        document.getElementById('welcome-title-text').innerText = eventConfig.activityName;
        document.getElementById('banner-blur').style.backgroundImage = "url('" + eventConfig.bannerUrl + "')";
        document.getElementById('banner-img').src = eventConfig.bannerUrl;
      }

      if(typeof localImages !== 'undefined') initGallery(localImages);
      if(typeof localPlaylist !== 'undefined') initMusic(localPlaylist);
    });

    function initMusic(data) {
      if (!data.length) return;
      myAudio.src = data[0].src;
      document.getElementById('track-name').innerText = data[0].name;
      myAudio.loop = true;
    }

    function toggleMusic() {
      if (myAudio.paused) {
        myAudio.play();
        document.getElementById('play-btn-icon').innerText = "⏸️";
      } else {
        myAudio.pause();
        document.getElementById('play-btn-icon').innerText = "▶️";
      }
    }

    function initGallery(data) {
      // 1. 生成月份導覽
      var navContainer = document.getElementById('month-nav');
      var currentMonth = null;
      var monthMap = {}; // 記錄月份對應的 index

      data.forEach(function(img, index) {
        if (img.monthLabel !== currentMonth) {
          monthMap[img.monthLabel] = index;
          var btn = document.createElement('button');
          btn.className = 'month-btn';
          btn.innerText = img.monthLabel;
          btn.onclick = function() { mySwiper.slideTo(index); };
          navContainer.appendChild(btn);
          currentMonth = img.monthLabel;
        }
      });

      // 2. 初始化 Swiper 虛擬列表
      mySwiper = new Swiper(".mySwiper", {
        effect: "coverflow",
        grabCursor: true,
        centeredSlides: true,
        slidesPerView: "auto",
        coverflowEffect: { rotate: 20, stretch: -30, depth: 400, modifier: 1, slideShadows: true },
        // --- 虛擬列表核心設定 ---
        virtual: {
          slides: data,
          renderSlide: function(slideData, index) {
            var imgUrl = isLocal ? slideData.highUrl : slideData.thumbUrl;
            return `
              <div class="swiper-slide">
                <div class="folder-badge">${slideData.folderName}</div>
                <div class="slide-bg-blur" style="background-image: url('${encodeURI(slideData.thumbUrl)}')"></div>
                <img class="main-photo" src="${imgUrl}" onclick="openOverlay('${imgUrl}')">
                <div class="photo-name">${slideData.folderName}</div>
              </div>`;
          },
        },
        pagination: { el: ".swiper-pagination", type: "fraction" },
        navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" },
        on: {
          slideChange: function() {
            // 更新月份按鈕狀態
            var activeIndex = this.activeIndex;
            var currentLabel = data[activeIndex].monthLabel;
            document.querySelectorAll('.month-btn').forEach(btn => {
              btn.classList.toggle('active', btn.innerText === currentLabel);
            });
          }
        }
      });
    }

    function openOverlay(url) {
      document.getElementById('overlay-img').src = url;
      document.getElementById('overlay').style.display = 'flex';
    }

    function closeOverlay() {
      document.getElementById('overlay').style.display = 'none';
    }

    document.getElementById('enter-btn').onclick = function() {
      document.getElementById('welcome-screen').style.opacity = '0';
      setTimeout(() => document.getElementById('welcome-screen').style.display = 'none', 600);
      // 啟動音樂與自動播放
      if (typeof localPlaylist !== 'undefined') {
        myAudio.play();
        document.getElementById('play-btn-icon').innerText = "⏸️";
      }
    };

    function toggleFullScreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    }
  </script>
</body>
</html>
