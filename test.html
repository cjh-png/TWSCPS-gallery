<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <title>實驗室 - 3D 智慧影展</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  
  <style>
    :root { --primary: #007AFF; --bg: #000; }
    body { margin: 0; background: var(--bg); color: #fff; font-family: 'Noto Sans TC', sans-serif; overflow: hidden; }

    /* 頂部橫幅：優化視覺深度 */
    .banner { position: relative; width: 100%; height: 220px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .banner-blur { position: absolute; width: 110%; height: 110%; background-size: cover; background-position: center; filter: blur(20px) brightness(0.5); z-index: 1; }
    .banner-img { position: relative; z-index: 2; height: 80%; object-fit: contain; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-radius: 8px; }

    /* 月份導覽：毛玻璃效果 */
    .nav-bar { 
      display: flex; gap: 10px; overflow-x: auto; padding: 15px; 
      background: rgba(255,255,255,0.05); backdrop-filter: blur(15px);
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .nav-bar::-webkit-scrollbar { display: none; }
    .nav-btn { 
      padding: 8px 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2);
      background: transparent; color: #aaa; white-space: nowrap; cursor: pointer; transition: 0.3s;
    }
    .nav-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* Swiper 主體 */
    .swiper { width: 100%; height: calc(100vh - 350px); padding: 30px 0 60px; }
    .swiper-slide { 
      width: 600px; max-width: 85%; height: 100%; 
      background: #111; border-radius: 20px; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.3s;
    }

    /* 借鑒：Swiper Zoom 容器結構 */
    .swiper-zoom-container { width: 100%; height: 100%; }
    .swiper-slide img { width: 100%; height: 100%; object-fit: contain; }

    /* 懸浮控制台 */
    .controls { 
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 15px; z-index: 100;
      background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.1);
    }
    .ctrl-btn { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
    .ctrl-btn.active { color: var(--primary); }

    /* 文字標記 */
    .info-badge { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 10px; font-size: 12px; }

    @media (max-width: 600px) { .swiper-slide { width: 90%; } }
  </style>
</head>
<body>

  <div class="banner">
    <div id="b-blur" class="banner-blur"></div>
    <img id="b-img" class="banner-img" src="" alt="Banner">
  </div>

  <div id="nav" class="nav-bar"></div>

  <div class="swiper mySwiper">
    <div class="swiper-wrapper"></div>
    <div class="swiper-pagination"></div>
  </div>

  <div class="controls">
    <button class="ctrl-btn" id="play-toggle" onclick="toggleAutoplay()">▶️</button>
    <button class="ctrl-btn" id="music-btn" onclick="toggleMusic()">🎵</button>
    <button class="ctrl-btn" onclick="toggleFS()">📺</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="./data.js"></script>

  <script>
    let swiper;
    const audio = new Audio();
    let isAutoplay = false;

    // 安全路徑處理函數
    function getSafePath(path) {
      if (!path) return "";
      return encodeURI(path).replace(/'/g, "%27");
    }

    // 初始化網頁
    document.addEventListener('DOMContentLoaded', () => {
      // 1. 設定 Banner
      const sBanner = getSafePath(eventConfig.bannerUrl);
      document.getElementById('b-blur').style.backgroundImage = `url('${sBanner}')`;
      document.getElementById('b-img').src = sBanner;

      // 2. 生成導覽按鈕
      const nav = document.getElementById('nav');
      const months = [...new Set(localImages.map(img => img.monthLabel))];
      months.forEach(m => {
        const btn = document.createElement('button');
        btn.className = 'nav-btn';
        btn.innerText = m;
        btn.onclick = () => {
          const targetIndex = localImages.findIndex(img => img.monthLabel === m);
          swiper.slideTo(targetIndex);
        };
        nav.appendChild(btn);
      });

      // 3. 初始化 Swiper (加入 Zoom 與 智慧預載)
      swiper = new Swiper(".mySwiper", {
        effect: "coverflow",
        grabCursor: true,
        centeredSlides: true,
        slidesPerView: "auto",
        zoom: true, // 🟢 啟用 iPad 雙指縮放
        loop: true,
        coverflowEffect: { rotate: 20, stretch: 0, depth: 300, modifier: 1, slideShadows: true },
        autoplay: false, // 預設關閉
        virtual: {
          enabled: true,
          slides: localImages,
          renderSlide: (slide, index) => {
            const sThumb = getSafePath(slide.thumbUrl);
            const sHigh = getSafePath(slide.highUrl);
            return `
              <div class="swiper-slide">
                <div class="info-badge">${slide.folderName}</div>
                <div class="swiper-zoom-container">
                  <img src="${sThumb}" 
                       data-src="${sHigh}" 
                       class="lazy-img"
                       onerror="this.onerror=null; this.src='${sHigh}'">
                </div>
              </div>`;
          }
        },
        pagination: { el: ".swiper-pagination", type: "progressbar" }, // 🟢 借鑒：進度條顯示
        on: {
          slideChange: function() {
            updateNav(this.realIndex);
          }
        }
      });

      // 音樂預載
      if(localPlaylist.length > 0) {
        audio.src = localPlaylist[0].src;
      }
    });

    function updateNav(index) {
      const currentMonth = localImages[index].monthLabel;
      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.classList.toggle('active', btn.innerText === currentMonth);
        if(btn.innerText === currentMonth) btn.scrollIntoView({ behavior: 'smooth', inline: 'center' });
      });
    }

    // 🟢 功能：切換自動播放 (Slideshow Mode)
    function toggleAutoplay() {
      isAutoplay = !isAutoplay;
      const btn = document.getElementById('play-toggle');
      if (isAutoplay) {
        swiper.autoplay.start();
        swiper.params.autoplay.delay = 3000;
        btn.innerText = "⏸️";
        btn.classList.add('active');
      } else {
        swiper.autoplay.stop();
        btn.innerText = "▶️";
        btn.classList.remove('active');
      }
    }

    function toggleMusic() {
      if (audio.paused) {
        audio.play();
        document.getElementById('music-btn').classList.add('active');
      } else {
        audio.pause();
        document.getElementById('music-btn').classList.remove('active');
      }
    }

    function toggleFS() {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    }
  </script>
</body>
</html>
