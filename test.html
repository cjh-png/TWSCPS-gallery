<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TWSCPS-2526線上影展 - Ipad 3D版</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
  
  <style>
    :root { --primary-color: #0056b3; --bg-color: #1a1a1d; }
    body { 
      margin: 0; padding: 0; font-family: 'Noto Sans TC', sans-serif; 
      background-color: var(--bg-color); color: #fff; overflow-x: hidden; 
      padding-bottom: 40vh; 
    }

    /* === Banner === */
    .banner-container { width: 100%; height: 260px; background-color: #000; overflow: hidden; }
    .banner-container img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* === 月份導覽 === */
    #month-nav { 
      display: flex; gap: 10px; overflow-x: auto; padding: 15px 10px; 
      background-color: rgba(0,0,0,0.5); position: sticky; top: 0; z-index: 100;
      scrollbar-width: none;
    }
    #month-nav::-webkit-scrollbar { display: none; }
    .month-btn { 
      padding: 8px 16px; border-radius: 20px; border: 1px solid #444;
      background-color: #2a2a2d; color: #ccc; white-space: nowrap; cursor: pointer; font-size: 14px;
    }
    .month-btn.active { background-color: var(--primary-color); color: #fff; border-color: var(--primary-color); }

    /* === Swiper === */
    .swiper { width: 100%; padding-top: 50px; padding-bottom: 50px; }
    
    .swiper-slide { 
      /* 🌟 核心修改：移除 width 限制，全交給 JS 的 slidesPerView 去算 */
      height: 60vh; 
      display: flex; align-items: center; justify-content: center; 
      background-color: #000; border-radius: 12px; overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    }
    
    .swiper-slide img { 
      width: 100%; height: 100%; object-fit: contain; display: block; 
    }

    .folder-badge {
      position: absolute; top: 10px; left: 10px; z-index: 10;
      background-color: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 4px; 
      font-size: clamp(10px, 2.5vw, 13px); 
    }

    #custom-pagination { text-align: center; margin: 20px 0; font-weight: bold; font-size: 18px; }
  </style>
</head>
<body>

  <div class="banner-container">
    <img id="banner-img" src="">
  </div>

  <div id="month-nav"></div>

  <div class="swiper mySwiper">
    <div class="swiper-wrapper"></div>
    <div id="custom-pagination"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
  <script src="./data.js"></script>

  <script>
    var mySwiper;

    document.addEventListener('DOMContentLoaded', function() {
      if (typeof eventConfig !== 'undefined') {
        document.getElementById('banner-img').src = eventConfig.bannerUrl;
      }
      if (typeof localImages !== 'undefined' && localImages.length > 0) {
        initGallery(localImages);
      }
    });

    function initGallery(data) {
      var nav = document.getElementById('month-nav');
      var months = [];
      data.forEach(function(img) {
        if (months.indexOf(img.monthLabel) === -1) months.push(img.monthLabel);
      });

      months.forEach(function(m) {
        var btn = document.createElement('button');
        btn.className = 'month-btn';
        btn.id = 'btn-month-' + m;
        btn.innerText = m;
        btn.onclick = function() {
          var targetIndex = data.findIndex(function(img) { return img.monthLabel === m; });
          mySwiper.slideTo(targetIndex);
        };
        nav.appendChild(btn);
      });

      mySwiper = new Swiper(".mySwiper", {
        // 🌟 核心修改 1：不寫 auto，直接告訴它畫面上顯示 1.5 張（中間 1 張，左右各露 0.25 張）
        slidesPerView: 1.5, 
        centeredSlides: true,
        
        // 3D 效果
        effect: "coverflow",
        coverflowEffect: {
          rotate: 30,       // 稍微增加旋轉角度
          stretch: 0,
          depth: 150,
          modifier: 1,
          slideShadows: true,
        },
        
        loop: false, 
        pagination: { el: "#custom-pagination", type: "fraction" },

        virtual: {
          slides: data,
          // 🌟 核心修改 2：前後緩存各 3 張就足夠了
          addSlidesBefore: 3, 
          addSlidesAfter: 3,  
          renderSlide: function (slideData) {
            // 保持最原始的成功路徑
            var imgUrl = (window.location.protocol === 'file:') ? slideData.highUrl : slideData.thumbUrl;
            return '<div class="swiper-slide">' +
                     '<div class="folder-badge">' + slideData.folderName + '</div>' +
                     '<img src="' + imgUrl + '">' +
                   '</div>';
          }
        },
        on: {
          slideChange: function() {
            updateActiveMonthBtn(data);
          }
        }
      });
    }

    function updateActiveMonthBtn(data) {
      if (!mySwiper) return;
      var currentIndex = mySwiper.activeIndex;
      if (!data[currentIndex]) return;
      var currentLabel = data[currentIndex].monthLabel;
      var btns = document.querySelectorAll('.month-btn');
      btns.forEach(function(b) { b.classList.remove('active'); });
      var activeBtn = document.getElementById('btn-month-' + currentLabel);
      if (activeBtn) {
        activeBtn.classList.add('active');
        activeBtn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
      }
    }
  </script>
</body>
</html>
