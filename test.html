<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>線上影展 - 穩定版</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
  
  <style>
    :root { --primary-color: #0056b3; --bg-color: #1a1a1d; }
    body { 
      margin: 0; padding: 0; font-family: 'Noto Sans TC', sans-serif; 
      background-color: var(--bg-color); color: #fff; overflow-x: hidden; 
      padding-bottom: 30vh; 
    }

    /* === 1. Banner === */
    .banner-container { width: 100%; height: 260px; background-color: #000; overflow: hidden; }
    .banner-container img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* === 2. 月份導覽 === */
    .month-nav-container {
      display: flex; gap: 8px; overflow-x: auto; white-space: nowrap;
      justify-content: center; margin-bottom: 20px; padding: 15px;
    }
    .month-btn {
      background: #333; border: none; padding: 10px 20px; border-radius: 30px;
      font-size: 14px; font-weight: bold; color: #ccc; cursor: pointer;
    }
    .month-btn.active { background: var(--primary-color); color: white; }

    /* === 3. Swiper 區域 === */
    .swiper-outer { position: relative; max-width: 1200px; margin: 0 auto; padding: 0 10px; }
    .swiper { width: 100%; height: 60vh; min-height: 400px; background: #000; border-radius: 12px; }
    
    /* 虛擬全螢幕 */
    .swiper.pseudo-fullscreen {
      position: fixed !important; top: 0 !important; left: 0 !important; 
      width: 100vw !important; height: 100vh !important;
      z-index: 9999; margin: 0; border-radius: 0;
    }

    .swiper-slide { display: flex; align-items: center; justify-content: center; }
    .swiper-slide img { max-width: 100%; max-height: 100%; object-fit: contain; }
    
    /* 資料夾名稱標籤 */
    .folder-badge {
      position: absolute; top: 20px; left: 20px; 
      background: rgba(0, 0, 0, 0.6); color: white;
      padding: 10px 20px; border-radius: 30px; 
      font-weight: bold; font-size: 24px; z-index: 10; 
      border-left: 5px solid var(--primary-color);
    }

    /* === 4. 退出全螢幕按鈕 (低調版) === */
    .exit-fs-btn {
      display: none; position: fixed; top: 15px; right: 15px; z-index: 10000;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(0, 0, 0, 0.3); color: white; border: 1px solid rgba(255,255,255,0.3);
      font-size: 20px; cursor: pointer; display: none; align-items: center; justify-content: center;
      transition: background 0.3s;
    }
    .exit-fs-btn:hover { background: rgba(0, 0, 0, 0.8); }

    /* 全螢幕觸發鈕 */
    .fs-trigger-btn {
      position: absolute; bottom: 20px; right: 20px; z-index: 50;
      background: rgba(0, 0, 0, 0.4); color: white; border: 1px solid #666;
      padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 14px;
    }

    /* 序號文字 */
    .custom-pagination { text-align: center; color: #fff; font-weight: bold; font-size: 20px; margin-top: 15px; }
    
    .swiper-button-next, .swiper-button-prev { color: white; }

    /* 音樂按鈕 */
    .music-control {
      position: fixed; bottom: 25px; left: 25px; z-index: 1000;
      background: rgba(0, 86, 179, 0.7); color: white;
      width: 50px; height: 50px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 24px; border: 1px solid #fff;
    }
    .music-control.playing { animation: rotate 4s linear infinite; }
    @keyframes rotate { from {transform: rotate(0deg);} to {transform: rotate(360deg);} }

    @media (max-width: 820px) {
        .banner-container { height: 160px; }
        .folder-badge { font-size: 18px; }
        .swiper { height: 50vh; }
    }
  </style>
</head>
<body>

  <audio id="bg-music" loop preload="auto"></audio>
  <div class="music-control" id="music-btn" onclick="toggleMusic()">🎵</div>

  <div class="exit-fs-btn" id="exit-btn" onclick="toggleFullscreen()">✕</div>

  <div class="banner-container">
    <img src="" id="banner-img">
  </div>

  <div class="main-content">
    <div class="month-nav-container" id="month-nav"></div>
    
    <div class="swiper-outer">
        <div class="swiper mySwiper" id="swiper-area">
          <div class="swiper-wrapper"></div>
          <div class="swiper-button-next"></div>
          <div class="swiper-button-prev"></div>
          <button id="fs-btn" class="fs-trigger-btn" onclick="toggleFullscreen()">⛶ 全螢幕模式</button>
        </div>
        <div class="custom-pagination" id="custom-pagination"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
  <script src="./data.js"></script> 
  
  <script>
    var mySwiper = null;
    var audio = document.getElementById('bg-music');
    var musicBtn = document.getElementById('music-btn');
    var isFullscreen = false;

    // 優先載入 Banner
    if(typeof eventConfig !== 'undefined') {
        document.title = eventConfig.activityName;
        document.getElementById('banner-img').src = eventConfig.bannerUrl;
    }

    document.addEventListener("DOMContentLoaded", function() {
      // 初始化音樂：直接引用，不清理隱藏字元
      if(typeof localPlaylist !== 'undefined' && localPlaylist.length > 0) {
          audio.src = localPlaylist[0].src;
      }
      
      if(typeof localImages !== 'undefined') {
          initGallery(localImages);
      }
    });

    function toggleMusic() {
      if (!audio.src) return;
      if (audio.paused) {
        // 點擊後嘗試播放
        var playPromise = audio.play();
        if (playPromise !== undefined) {
          playPromise.then(function() {
            musicBtn.classList.add('playing');
            musicBtn.innerText = '📻';
          }).catch(function(error) {
            console.log("播放失敗，請檢查檔案路徑:", error);
          });
        }
      } else {
        audio.pause();
        musicBtn.classList.remove('playing');
        musicBtn.innerText = '🎵';
      }
    }

    function toggleFullscreen() {
      var swiperArea = document.getElementById('swiper-area');
      var exitBtn = document.getElementById('exit-btn');
      var entryBtn = document.getElementById('fs-btn');

      if (!isFullscreen) {
        swiperArea.classList.add('pseudo-fullscreen');
        exitBtn.style.display = 'flex'; // 顯示圓形 X 鈕
        entryBtn.style.display = 'none';
        isFullscreen = true;
      } else {
        swiperArea.classList.remove('pseudo-fullscreen');
        exitBtn.style.display = 'none';
        entryBtn.style.display = 'block';
        isFullscreen = false;
      }
      if(mySwiper) { setTimeout(function() { mySwiper.update(); }, 200); }
    }

    function initGallery(data) {
      if (!data || data.length === 0) return;
      
      var navContainer = document.getElementById('month-nav');
      var currentMonth = null;
      var monthStartIndex = {};

      for (var i = 0; i < data.length; i++) {
        var imgData = data[i];
        if (imgData.monthLabel !== currentMonth) {
          if (!(imgData.monthLabel in monthStartIndex)) {
            monthStartIndex[imgData.monthLabel] = i;
            var btn = document.createElement('button');
            btn.className = 'month-btn';
            btn.innerText = imgData.monthLabel;
            btn.id = 'btn-month-' + imgData.monthLabel;
            (function(idx) {
              btn.onclick = function() { mySwiper.slideTo(idx, 0); };
            })(i);
            navContainer.appendChild(btn);
          }
          currentMonth = imgData.monthLabel;
        }
      }

      mySwiper = new Swiper(".mySwiper", {
        slidesPerView: 1, 
        spaceBetween: 10,
        navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" },
        pagination: { el: "#custom-pagination", type: "fraction" },
        virtual: {
          slides: data,
          renderSlide: function (slideData) {
            // 根據是否為本地端選擇路徑
            var imgUrl = (window.location.protocol === 'file:') ? slideData.highUrl : slideData.thumbUrl;
            return '<div class="swiper-slide">' +
                     '<div class="folder-badge">' + slideData.folderName + '</div>' +
                     '<img src="' + imgUrl + '">' +
                   '</div>';
          }
        },
        on: { slideChange: function() { updateActiveMonthBtn(data); } }
      });
      updateActiveMonthBtn(data);
    } 

    function updateActiveMonthBtn(data) {
      if (!mySwiper) return;
      var currentIndex = mySwiper.activeIndex;
      var currentLabel = data[currentIndex].monthLabel;
      var btns = document.querySelectorAll('.month-btn');
      btns.forEach(function(b) { b.classList.remove('active'); });
      var activeBtn = document.getElementById('btn-month-' + currentLabel);
      if (activeBtn) {
        activeBtn.classList.add('active');
        activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }
    }
  </script>
</body>
</html>
