<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>線上影展 - 3D 展廳</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
  
  <style>
    :root { --primary-color: #0056b3; --bg-color: #1a1a1d; }
    body { margin: 0; padding: 0; font-family: 'Noto Sans TC', sans-serif; background-color: var(--bg-color); color: #fff; overflow-x: hidden; -webkit-user-select: none; user-select: none; }

    /* === Banner & 介面樣式 === */
    .banner-container { position: relative; width: 100%; height: 260px; background-color: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
    .banner-bg-blur { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; filter: blur(25px) brightness(0.6); transform: scale(1.1); z-index: 1; }
    .banner-new-photo { display: block; max-width: 100%; height: 100%; object-fit: contain; position: relative; z-index: 2; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
    
    .main-content { max-width: 1600px; margin: -20px auto 40px auto; padding: 10px; position: relative; z-index: 10; }
    
    /* 月份按鈕 */
    .month-nav-container { background: rgba(40,40,45,0.8); padding: 10px 15px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); margin-bottom: 20px; display: flex; gap: 8px; overflow-x: auto; white-space: nowrap; -ms-overflow-style: none; scrollbar-width: none; backdrop-filter: blur(10px); justify-content: center; }
    .month-nav-container::-webkit-scrollbar { display: none; }
    .month-btn { background: rgba(60,60,65,0.5); border: none; padding: 8px 18px; border-radius: 30px; font-size: 14px; font-weight: bold; color: #ccc; cursor: pointer; transition: all 0.3s; }
    .month-btn.active { background: var(--primary-color); color: white; box-shadow: 0 4px 15px rgba(0,86,179,0.5); }

    /* Swiper & 幻燈片 */
    .swiper { width: 100%; padding-top: 20px; padding-bottom: 70px; }
    .swiper-slide { width: auto; height: 80vh; max-height: 900px; min-height: 400px; background-color: #000; border-radius: 15px; box-shadow: 0 25px 60px rgba(0,0,0,0.6); overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; }
    .swiper-slide img.main-photo { display: block; max-width: 100%; height: 100%; object-fit: contain; position: relative; z-index: 2; opacity: 0; transition: opacity 0.4s ease-in-out; cursor: pointer; }
    .swiper-slide-active img.main-photo { opacity: 1; }
    .folder-badge { position: absolute; top: 20px; left: 20px; background: rgba(0, 0, 0, 0.6); color: white; padding: 7px 18px; border-radius: 30px; font-weight: bold; font-size: 13px; z-index: 10; backdrop-filter: blur(5px); border-left: 3px solid var(--primary-color); opacity: 0; transition: opacity 0.4s; }
    .swiper-slide-active .folder-badge { opacity: 1; }
    .photo-name { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); color: rgba(255,255,255,0.7); font-size: 11px; padding: 40px 15px 15px 15px; text-align: center; z-index: 4; letter-spacing: 2px;}

    /* 控制元件 */
    .swiper-pagination-fraction { color: #fff !important; font-weight: bold; font-size: 16px; bottom: 15px !important;}
    .swiper-button-next, .swiper-button-prev { color: white !important; background: rgba(255,255,255,0.1); width: 45px !important; height: 45px !important; border-radius: 50%; padding: 10px; backdrop-filter: blur(5px); opacity: 0.8;}
    
    .music-player { position: fixed; bottom: 20px; right: 20px; z-index: 1000; background: rgba(30, 30, 35, 0.8); backdrop-filter: blur(10px); padding: 8px 15px 8px 8px; border-radius: 50px; display: flex; align-items: center; gap: 10px; box-shadow: 0 8px 25px rgba(0,0,0,0.6); }
    .play-btn { background: var(--primary-color); border: none; color: white; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; }
    .track-info { font-size: 12px; color: #ddd; max-width: 120px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 10000; backdrop-filter: blur(10px); cursor: zoom-out; }
    #overlay img { max-width: 95%; max-height: 95%; object-fit: contain; border-radius: 8px; }

    /* 開場動畫按鈕 (強制 CSS 顯示) */
    #welcome-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.6s ease; }
    .welcome-title { font-size: 28px; font-weight: bold; margin-bottom: 20px; text-align: center; }
    #loading-text { color: #999; font-size: 16px; margin-bottom: 20px; }
    
    @keyframes forceShow { 0%, 80% { opacity: 0; pointer-events: none; } 100% { opacity: 1; pointer-events: auto; } }
    #enter-btn { padding: 12px 35px; font-size: 18px; font-weight: bold; border-radius: 30px; background: var(--primary-color); color: white; border: none; cursor: pointer; opacity: 0; pointer-events: none; animation: forceShow 1.5s forwards; }
    #error-log { color: #ff6b6b; font-size: 14px; margin-top: 15px; text-align: center; max-width: 80%; }

    @media (max-width: 600px) {
        .swiper-slide { height: 70vh; width: 85%; }
        .banner-container { height: 180px; } 
    }
  </style>
</head>
<body>

  <div id="welcome-screen">
    <div class="welcome-title" id="welcome-title-text">活動載入中...</div>
    <div id="loading-text">✨ 正在為您佈置 3D 展廳，請稍候...</div>
    <button id="enter-btn">進入展廳</button>
  </div>

  <div class="banner-container">
    <div class="banner-bg-blur" id="banner-blur"></div>
    <img src="" id="banner-img" class="banner-new-photo" onerror="this.style.display='none'">
  </div>

  <div class="main-content">
    <h2 id="activity-title" style="text-align:center;"></h2>
    <div class="month-nav-container" id="month-nav" style="display: none;"></div>
    
    <div class="swiper mySwiper" style="display: none;" id="swiper-area">
      <div class="swiper-wrapper" id="swiper-wrapper"></div>
      <div class="swiper-pagination"></div>
      <div class="swiper-button-next"></div>
      <div class="swiper-button-prev"></div>
    </div>
  </div>

  <div class="music-player" id="music-player-ui" style="display: none;">
    <button class="play-btn" onclick="toggleMusic()" id="play-btn-icon">▶️</button>
    <div class="track-info" id="track-name">載入音樂中...</div>
  </div>

  <div id="overlay" onclick="closeOverlay()">
    <img id="overlay-img" src="">
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
  <script src="./data.js"></script> 
  
  <script>
    // 錯誤監控
    window.onerror = function(msg, url, line) {
      var logDiv = document.getElementById('error-log');
      if (!logDiv) { logDiv = document.createElement('div'); logDiv.id = 'error-log'; document.getElementById('welcome-screen').appendChild(logDiv); }
      logDiv.innerHTML += "⚠️ 錯誤: " + msg + " (行: " + line + ")<br>";
    };

    var mySwiper = null;
    var monthStartIndex = {}; 
    var currentAudioIndex = 0;
    var myAudio = new Audio();
    var virtualSlidesData = []; // 🌟 用來存放 500 張照片的「字串」，而不是實體 DOM
    
    var isLocal = window.location.protocol === 'file:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';

    document.addEventListener("DOMContentLoaded", function() {
      try {
        if(typeof eventConfig !== 'undefined') {
            document.title = eventConfig.activityName;
            document.getElementById('activity-title').innerText = eventConfig.activityName;
            document.getElementById('welcome-title-text').innerText = eventConfig.activityName;
            document.getElementById('banner-blur').style.backgroundImage = "url('" + eventConfig.bannerUrl + "')";
            document.getElementById('banner-img').src = eventConfig.bannerUrl;
        }
        if(typeof localImages !== 'undefined') initGallery(localImages);
        if(typeof localPlaylist !== 'undefined') initMusic(localPlaylist);
      } catch (error) {
        console.error(error);
      }
    });

    // === 音樂邏輯 ===
    function initMusic(data) {
      if (data && data.length > 0) { document.getElementById('music-player-ui').style.display = 'flex'; loadAudioTrack(0); }
    }
    function loadAudioTrack(index) {
      if (index >= localPlaylist.length) index = 0; 
      currentAudioIndex = index;
      myAudio.src = localPlaylist[index].src;
      document.getElementById('track-name').innerText = localPlaylist[index].name;
      updatePlayBtnState(false);
    }
    myAudio.addEventListener('ended', function() { loadAudioTrack(currentAudioIndex + 1); myAudio.play().catch(e=>console.log(e)); });
    function toggleMusic() { myAudio.paused ? myAudio.play().then(()=>updatePlayBtnState(true)) : (myAudio.pause(), updatePlayBtnState(false)); }
    function updatePlayBtnState(isPlaying) { document.getElementById('play-btn-icon').innerText = isPlaying ? "⏸️" : "▶️"; }

    // === 🌟 拯救記憶體：虛擬滾動相簿邏輯 ===
    window.openOverlay = function(url) {
      document.getElementById('overlay-img').src = url;
      document.getElementById('overlay').style.display = 'flex';
      if (mySwiper && mySwiper.autoplay) mySwiper.autoplay.stop();
    };
    
    window.closeOverlay = function() {
      document.getElementById('overlay').style.display = 'none';
      if (mySwiper && mySwiper.autoplay) mySwiper.autoplay.start();
    };

    function initGallery(data) {
      if (!data || data.length === 0) return;

      document.getElementById('swiper-area').style.display = 'block';
      document.getElementById('month-nav').style.display = 'flex';
      var navContainer = document.getElementById('month-nav');
      var currentMonth = null;

      data.forEach(function(img, index) {
        // 建立月份導航列
        if (img.monthLabel !== currentMonth) {
          if (!(img.monthLabel in monthStartIndex)) {
            monthStartIndex[img.monthLabel] = index;
            var btn = document.createElement('button');
            btn.className = 'month-btn';
            btn.innerText = img.monthLabel;
            btn.id = 'btn-month-' + img.monthLabel;
            btn.onclick = function() { if(mySwiper) { mySwiper.slideTo(index); mySwiper.autoplay.start(); }};
            navContainer.appendChild(btn);
          }
          currentMonth = img.monthLabel;
        }

        // 🌟 關鍵：將每張幻燈片寫成 HTML「字串」，讓 Swiper 引擎來決定何時渲染
        var imgUrl = isLocal ? img.highUrl : img.thumbUrl;
        var slideHTML = `
          <div class="swiper-slide">
            <div class="folder-badge">${img.folderName}</div>
            <img class="main-photo" src="${imgUrl}" onclick="openOverlay('${imgUrl}')">
            <div class="photo-name">${img.folderName}</div>
          </div>
        `;
        virtualSlidesData.push(slideHTML);
      });

      // 初始化 3D 引擎，並掛載 Virtual Module
      mySwiper = new Swiper(".mySwiper", {
        initialSlide: 0, effect: "coverflow", grabCursor: true, centeredSlides: true, slidesPerView: "auto", 
        coverflowEffect: { rotate: 15, stretch: -15, depth: 400, modifier: 1, slideShadows: true },
        autoplay: false, 
        
        // 🌟 啟動虛擬滾動 (Virtual Slides)！永遠只載入目前與前後共 5 張照片！
        virtual: {
          slides: virtualSlidesData,
          addSlidesBefore: 2, 
          addSlidesAfter: 2,  
        },

        pagination: { el: ".swiper-pagination", type: "fraction" },
        navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" },
        on: { slideChange: updateActiveMonthBtn }
      });
      updateActiveMonthBtn(); 
    }

    // 進入展廳按鈕
    document.getElementById('enter-btn').onclick = function() {
      if (typeof localPlaylist !== 'undefined' && localPlaylist.length > 0) {
        myAudio.load(); myAudio.play().then(() => updatePlayBtnState(true)).catch(e=>{});
      }
      var ws = document.getElementById('welcome-screen');
      ws.style.opacity = '0';
      setTimeout(() => ws.style.display = 'none', 600);
      if (mySwiper) { mySwiper.update(); mySwiper.slideTo(0); mySwiper.autoplay.start(); }
    };

    function updateActiveMonthBtn() {
      if (!mySwiper || typeof localImages === 'undefined' || localImages.length === 0) return;
      var currentIndex = mySwiper.activeIndex;
      if (!localImages[currentIndex]) return;
      
      var btns = document.querySelectorAll('.month-btn');
      btns.forEach(b => b.classList.remove('active'));
      var activeBtn = document.getElementById('btn-month-' + localImages[currentIndex].monthLabel);
      if (activeBtn) {
        activeBtn.classList.add('active');
        activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }
    }
  </script>
</body>
</html>
